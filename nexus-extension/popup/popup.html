<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f23;
      --surface:  #1a1a35;
      --border:   #2e2e5a;
      --accent:   #6c63ff;
      --text:     #e8e8f0;
      --muted:    #9090b0;
      --success:  #4ade80;
      --error:    #f87171;
      --warning:  #facc15;
    }

    body {
      width: 360px; min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .header-logo { font-size: 20px; }
    .header-title { font-weight: 700; font-size: 15px; color: var(--accent); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-left: auto; flex-shrink: 0;
    }
    .status-dot.online  { background: var(--success); }
    .status-dot.offline { background: var(--error); }

    /* ── Quick add ── */
    .quick-add {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 6px;
    }
    .quick-add input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 7px 10px;
      font-size: 12px; outline: none;
    }
    .quick-add input:focus { border-color: var(--accent); }
    .quick-add button {
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; padding: 7px 12px; cursor: pointer;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .quick-add button:hover { opacity: .85; }

    /* ── Tabs ── */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab {
      flex: 1; padding: 8px; text-align: center; cursor: pointer;
      font-size: 12px; color: var(--muted); border: none; background: none;
      border-bottom: 2px solid transparent; transition: color .15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Download list ── */
    .dl-list { max-height: 280px; overflow-y: auto; }
    .dl-item {
      padding: 8px 12px; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }
    .dl-item-top { display: flex; align-items: center; gap: 6px; }
    .dl-title    { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dl-status   { font-size: 10px; font-weight: 700; }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
    .dl-meta { font-size: 10px; color: var(--muted); }

    .empty-msg {
      padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px;
    }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 8px 12px; display: flex; gap: 6px;
    }
    .footer button {
      flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); cursor: pointer; font-size: 11px;
    }
    .footer button:hover { background: var(--border); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">⬡</div>
    <div class="header-title">Nexus Downloader</div>
    <div id="status-dot" class="status-dot offline" title="Checking…"></div>
  </div>

  <!-- Quick add -->
  <div class="quick-add">
    <input id="url-input" type="url" placeholder="Paste URL to download…" />
    <button id="add-btn">⬇ Add</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="active">Active</button>
    <button class="tab" data-tab="completed">Done</button>
    <button class="tab" data-tab="all">All</button>
  </div>

  <!-- Download list -->
  <div class="dl-list" id="dl-list">
    <div class="empty-msg" id="empty-msg">No downloads yet</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button id="open-app-btn">Open Nexus App</button>
    <button id="settings-btn">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
