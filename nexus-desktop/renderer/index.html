<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob: https:;" />
  <title>Nexus Download Manager</title>

  <!-- Google Fonts: Syne (display) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- React 18 via CDN (development builds for readable errors; swap to .production.min.js for prod) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel standalone for JSX (no build step required) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:  #080810;
      --bg-1:     #0f0f1c;
      --bg-2:     #161628;
      --bg-3:     #1e1e35;
      --border:   rgba(255,255,255,0.06);
      --accent:   #00ff88;
      --accent2:  #00d4ff;
      --accent3:  #f97316;
      --red:      #ff4444;
      --text-1:   #eef2ff;
      --text-2:   #94a3b8;
      --radius:   10px;
      --sidebar-w: 220px;

      /* Legacy aliases used by existing components */
      --bg:        var(--bg-base);
      --surface:   var(--bg-2);
      --surface2:  var(--bg-3);
      --text:      var(--text-1);
      --text-muted: var(--text-2);
      --success:   var(--accent);
      --warning:   var(--accent3);
      --error:     var(--red);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-1);
      font-size: 14px;
      line-height: 1.5;
    }

    #root { display: flex; flex-direction: column; height: 100vh; }

    /* ── Custom scrollbar: 4px, bg-3 track, accent thumb, rounded ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-3); border-radius: 2px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

    /* ── Utility ── */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: 4px; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .flex-1 { flex: 1; }
    .overflow-y-auto { overflow-y: auto; }
    .overflow-hidden { overflow: hidden; }
    .text-muted { color: var(--text-2); }
    .text-sm { font-size: 12px; }
    .text-accent { color: var(--accent); }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .w-full { width: 100%; }
    .h-full { height: 100%; }

    /* ── Button ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; transition: opacity .15s, transform .1s;
      user-select: none; font-family: inherit;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-ghost   { background: transparent; color: var(--text-1); border: 1px solid var(--border); }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Input ── */
    .input {
      background: var(--bg-3); border: 1px solid var(--border);
      color: var(--text-1); border-radius: var(--radius);
      padding: 8px 12px; font-size: 13px; outline: none; width: 100%;
      font-family: inherit;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,255,136,0.1); }

    /* ── Modal backdrop ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px; width: min(500px, 90vw);
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }
    .modal-title {
      font-size: 18px; font-weight: 700; margin-bottom: 20px;
      color: var(--text-1); font-family: 'Syne', sans-serif;
    }

    /* ── Mono font for data ── */
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Neon glow effects ── */
    .glow-green { text-shadow: 0 0 8px rgba(0,255,136,0.6); color: var(--accent); }
    .glow-yellow { text-shadow: 0 0 8px rgba(249,115,22,0.6); color: var(--accent3); }

    /* ── Animated gradient for active progress bars ── */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .progress-active {
      background: linear-gradient(90deg, #00ff88, #00d4ff, #00ff88);
      background-size: 200% auto;
      animation: shimmer 2s linear infinite;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/TitleBar.jsx"></script>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/DownloadCard.jsx"></script>
  <script type="text/babel" src="components/SpeedGraph.jsx"></script>
  <script type="text/babel" src="components/AddDownloadModal.jsx"></script>
  <script type="text/babel" src="components/PlaylistModal.jsx"></script>
  <script type="text/babel" src="components/DownloadList.jsx"></script>
  <script type="text/babel" src="components/StatsBar.jsx"></script>
  <script type="text/babel" src="components/NotificationToast.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
