<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com; img-src 'self' data: blob:;" />
  <title>Nexus Download Manager</title>

  <!-- React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX (production should use a build step) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Recharts for speed graph -->
  <script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f23;
      --surface:   #1a1a35;
      --surface2:  #252548;
      --border:    #2e2e5a;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --text:      #e8e8f0;
      --text-muted:#9090b0;
      --success:   #4ade80;
      --warning:   #facc15;
      --error:     #f87171;
      --radius:    8px;
      --sidebar-w: 220px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    #root { display: flex; flex-direction: column; height: 100vh; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Utility ── */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: 4px; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .flex-1 { flex: 1; }
    .overflow-y-auto { overflow-y: auto; }
    .overflow-hidden { overflow: hidden; }
    .text-muted { color: var(--text-muted); }
    .text-sm { font-size: 12px; }
    .text-accent { color: var(--accent); }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .w-full { width: 100%; }
    .h-full { height: 100%; }

    /* ── Button ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; transition: opacity .15s, transform .1s;
      user-select: none;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-danger  { background: var(--error); color: #fff; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Input ── */
    .input {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 8px 12px; font-size: 13px; outline: none; width: 100%;
    }
    .input:focus { border-color: var(--accent); }

    /* ── Modal backdrop ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: min(480px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="components/TitleBar.jsx"></script>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/DownloadCard.jsx"></script>
  <script type="text/babel" src="components/SpeedGraph.jsx"></script>
  <script type="text/babel" src="components/AddDownloadModal.jsx"></script>
  <script type="text/babel" src="components/PlaylistModal.jsx"></script>
  <script type="text/babel" src="components/DownloadList.jsx"></script>
  <script type="text/babel" src="components/StatsBar.jsx"></script>
  <script type="text/babel" src="components/NotificationToast.jsx"></script>
</body>
</html>
